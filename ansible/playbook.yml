---
- name: Provision Docker Sandbox
  hosts: idp_target
  become: true

  tasks:
    - name: Update system package cache
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Install Docker engine and core dependencies
      apt:
        name:
          - curl
          - git
          - docker.io
        state: present

    - name: Ensure Docker service is running and enabled on boot
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add standard ubuntu user to the docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
      # Crucial Step: Allows Go CLI to deploy containers 
      # Without needing to run every single command as 'sudo'!

    - name: Verify cluster runtime engine
      command: docker --version
      register: docker_version

    - name: Broadcast sandbox readiness metrics
      debug:
        msg: "SANDBOX PROVISIONED: Ready for deployments via runtime engine {{ docker_version.stdout }}"
